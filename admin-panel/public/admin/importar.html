<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Importação em lote — Painel Próxima Parada</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@700;800&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
  <style>
    .import-grid { display:grid; grid-template-columns:minmax(0, 1.4fr) minmax(280px, .6fr); gap:16px; }
    #jsonInput { min-height:480px; font:12px/1.55 "IBM Plex Mono", monospace; resize:vertical; }
    .result-list { display:grid; gap:8px; margin-top:14px; }
    .result-item { padding:10px 12px; border-radius:10px; background:#f2f5f4; font-size:13px; }
    .result-item.erro { background:#fff0f0; color:#9f2525; }
    .result-item.criado { background:#effbe5; color:#315e11; }
    .result-item.atualizado { background:#eaf7ff; color:#14577a; }
    .result-item.duplicado { background:#fff8dd; color:#725b00; }
    @media (max-width:900px){ .import-grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
<div class="admin-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="page-header">
      <div>
        <h1>Importação em lote</h1>
        <p>Cadastra até 50 hotéis e restaurantes, copia uma foto real para o Cloudinary e ignora duplicatas.</p>
      </div>
      <a href="dashboard.html" class="btn btn-ghost">← Voltar</a>
    </div>

    <div class="import-grid">
      <section class="card">
        <div class="field">
          <label>Dados em JSON</label>
          <textarea id="jsonInput" spellcheck="false" placeholder='{"items":[...]}'></textarea>
        </div>
        <div style="display:flex; gap:12px; margin-top:14px; flex-wrap:wrap;">
          <button class="btn btn-mint" id="importBtn">Validar e importar</button>
          <button class="btn btn-ghost" id="formatBtn" type="button">Formatar JSON</button>
        </div>
      </section>

      <aside class="card">
        <h2 style="font-family:Sora,sans-serif; font-size:18px;">Resultado</h2>
        <p id="summary" style="margin-top:8px; color:var(--gray);">Nenhuma importação executada.</p>
        <div id="results" class="result-list"></div>
      </aside>
    </div>
  </main>
</div>
<script src="admin.js"></script>
<script>
  initSidebar('importar');
  const input = document.getElementById('jsonInput');
  const importBtn = document.getElementById('importBtn');
  const results = document.getElementById('results');
  const summary = document.getElementById('summary');

  document.getElementById('formatBtn').addEventListener('click', () => {
    try { input.value = JSON.stringify(JSON.parse(input.value), null, 2); }
    catch { showToast('JSON inválido.', true); }
  });

  importBtn.addEventListener('click', async () => {
    let payload;
    try {
      payload = JSON.parse(input.value);
      if (!Array.isArray(payload.items) || !payload.items.length) throw new Error('A lista items está vazia.');
    } catch (error) {
      showToast(error.message || 'JSON inválido.', true);
      return;
    }

    importBtn.disabled = true;
    importBtn.innerHTML = '<span class="spin"></span> Copiando fotos e cadastrando...';
    results.innerHTML = '';
    summary.textContent = 'Importação em andamento. Não feche esta página.';

    try {
      const data = await api('/api/import/establishments', { method:'POST', body:JSON.stringify(payload) });
      summary.textContent = `${data.summary.criado} criados, ${data.summary.atualizado || 0} atualizados, ${data.summary.duplicado} duplicados ignorados e ${data.summary.erro} erros.`;
      results.innerHTML = data.results.map((item) => `
        <div class="result-item ${item.status}">
          <strong>${item.name}</strong><br>${item.status === 'erro' ? item.error : item.status}
        </div>`).join('');
      showToast(data.summary.erro ? 'Importação concluída com pendências.' : 'Importação concluída com sucesso.', Boolean(data.summary.erro));
    } catch (error) {
      summary.textContent = error.message;
      showToast(error.message, true);
    } finally {
      importBtn.disabled = false;
      importBtn.textContent = 'Validar e importar';
    }
  });
</script>
</body>
</html>
