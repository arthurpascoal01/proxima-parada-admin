<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Gestão — Próxima Parada</title><link rel="stylesheet" href="admin.css"><link href="https://fonts.googleapis.com/css2?family=Sora:wght@700;800&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet"></head><body><div class="admin-shell"><div class="sidebar" id="sidebar"></div><main class="main"><div class="page-header"><div><span class="eyebrow">QUALIDADE E CRESCIMENTO</span><h1>Gestão da plataforma</h1><p>Modere avaliações, analise parceiros e acompanhe os últimos 30 dias.</p></div></div><div id="metrics" class="community-stats"></div><section class="card" style="margin-top:18px"><h2 style="font-family:var(--font-display);font-size:18px">Avaliações pendentes</h2><div id="reviews" style="margin-top:14px"></div></section><section class="card" style="margin-top:18px"><h2 style="font-family:var(--font-display);font-size:18px">Solicitações de parceiros</h2><div id="partners" style="margin-top:14px"></div></section></main></div><script src="admin.js"></script><script>
initSidebar('gestao');
const row=(title,meta,text,actions)=>`<div style="padding:14px 0;border-bottom:1px solid var(--border)"><b>${title}</b><div class="mono" style="font-size:10px;color:var(--gray);margin:5px 0">${meta}</div><p style="font-size:13px">${text||''}</p><div style="display:flex;gap:8px;margin-top:9px">${actions}</div></div>`;
async function load(){try{const [m,r,p]=await Promise.all([api('/api/platform/admin/metrics'),api('/api/platform/admin/reviews'),api('/api/platform/admin/partners')]);metrics.innerHTML=`<div class="cs-card"><b>${m.users}</b><span>usuários</span></div><div class="cs-card"><b>${m.pendingReviews}</b><span>avaliações pendentes</span></div><div class="cs-card"><b>${m.pendingPartners}</b><span>parceiros pendentes</span></div>`;reviews.innerHTML=r.filter(x=>x.status==='pending').map(x=>row(x.userName,`★ ${x.rating} · ${x.spotId}`,x.comment,`<button class="btn btn-mint btn-sm" onclick="review('${x._id}','approved')">Aprovar</button><button class="btn btn-danger btn-sm" onclick="review('${x._id}','rejected')">Rejeitar</button>`)).join('')||'<p class="empty-state">Nenhuma avaliação pendente.</p>';partners.innerHTML=p.filter(x=>x.status==='pending').map(x=>row(x.businessName,`${x.category} · ${x.city}`,`${x.address} · ${x.contact}`,`<button class="btn btn-mint btn-sm" onclick="partner('${x._id}','approved')">Aprovar</button><button class="btn btn-danger btn-sm" onclick="partner('${x._id}','rejected')">Rejeitar</button>`)).join('')||'<p class="empty-state">Nenhum parceiro pendente.</p>'}catch(e){showToast(e.message,true)}}
async function review(id,status){await api(`/api/platform/admin/reviews/${id}`,{method:'PATCH',body:JSON.stringify({status})});load()}async function partner(id,status){await api(`/api/platform/admin/partners/${id}`,{method:'PATCH',body:JSON.stringify({status})});load()}load();
</script></body></html>
